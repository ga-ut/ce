name: task-to-draft-pr

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Optional source issue number to convert into a draft PR
        required: false
        type: string
      source_issue_number:
        description: Optional source issue number to link in the PR body
        required: false
        type: string
      task_key:
        description: Stable task key used to name the branch and de-duplicate PRs
        required: false
        type: string
      task_title:
        description: Task title or PR title
        required: false
        type: string
      task_body:
        description: Task body passed to Codex
        required: false
        type: string

permissions:
  actions: write
  contents: write
  issues: read
  pull-requests: write

jobs:
  create-pr:
    if: github.event_name == 'workflow_dispatch' || (startsWith(github.event.issue.title, '[TASK]') && github.event.issue.user.login != 'github-actions[bot]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: |
          SOURCE_ISSUE_NUMBER="${INPUT_SOURCE_ISSUE_NUMBER:-${INPUT_ISSUE_NUMBER:-$EVENT_ISSUE_NUMBER}}"
          TASK_KEY="$INPUT_TASK_KEY"
          BASE_BRANCH=$(gh repo view "$GH_REPO" --json defaultBranchRef --jq '.defaultBranchRef.name')

          if [[ -z "$TASK_KEY" ]]; then
            if [[ -n "$SOURCE_ISSUE_NUMBER" ]]; then
              TASK_KEY="issue-$SOURCE_ISSUE_NUMBER"
            elif [[ -n "$INPUT_TASK_TITLE" ]]; then
              TASK_KEY=$(printf '%s' "$INPUT_TASK_TITLE" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+|-+$//g')
            else
              echo "Either task_key or a source issue number is required."
              exit 1
            fi
          fi

          BRANCH="task-$TASK_KEY"

          if [[ "$(gh pr list --repo "$GH_REPO" --head "$BRANCH" --json number --jq 'length')" != "0" ]]; then
            echo "PR already exists for $BRANCH; skipping."
            exit 0
          fi

          git fetch origin "$BASE_BRANCH"
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git push origin :refs/heads/"$BRANCH"
          fi
          git checkout -B "$BRANCH" "origin/$BASE_BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore(task): bootstrap $TASK_KEY"
          git push origin HEAD:refs/heads/"$BRANCH"
        env:
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_ISSUE_NUMBER: ${{ inputs.issue_number }}
          INPUT_SOURCE_ISSUE_NUMBER: ${{ inputs.source_issue_number }}
          INPUT_TASK_KEY: ${{ inputs.task_key }}
          INPUT_TASK_TITLE: ${{ inputs.task_title }}

      - run: |
          SOURCE_ISSUE_NUMBER="${INPUT_SOURCE_ISSUE_NUMBER:-${INPUT_ISSUE_NUMBER:-$EVENT_ISSUE_NUMBER}}"
          TASK_KEY="$INPUT_TASK_KEY"
          TASK_TITLE="${INPUT_TASK_TITLE:-$EVENT_ISSUE_TITLE}"
          TASK_BODY="${INPUT_TASK_BODY:-$EVENT_ISSUE_BODY}"
          BASE_BRANCH=$(gh repo view "$GH_REPO" --json defaultBranchRef --jq '.defaultBranchRef.name')

          if [[ -z "$TASK_KEY" ]]; then
            if [[ -n "$SOURCE_ISSUE_NUMBER" ]]; then
              TASK_KEY="issue-$SOURCE_ISSUE_NUMBER"
            elif [[ -n "$TASK_TITLE" ]]; then
              TASK_KEY=$(printf '%s' "$TASK_TITLE" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+|-+$//g')
            else
              echo "Either task_key or a source issue number is required."
              exit 1
            fi
          fi

          if [[ -z "$TASK_TITLE" ]]; then
            if [[ -n "$SOURCE_ISSUE_NUMBER" ]]; then
              TASK_TITLE="Task #$SOURCE_ISSUE_NUMBER"
            else
              TASK_TITLE="Scheduled task: $TASK_KEY"
            fi
          fi

          BRANCH="task-$TASK_KEY"

          if [[ "$(gh pr list --repo "$GH_REPO" --head "$BRANCH" --json number --jq 'length')" != "0" ]]; then
            echo "PR already exists for $BRANCH; skipping."
            exit 0
          fi

          if [[ -z "$TASK_BODY" && -n "$SOURCE_ISSUE_NUMBER" ]]; then
            TASK_BODY=$(gh issue view "$SOURCE_ISSUE_NUMBER" --repo "$GH_REPO" --json body --jq '.body')
          fi

          if [[ -z "$TASK_BODY" ]]; then
            echo "Task body is required."
            exit 1
          fi

          {
            if [[ -n "$SOURCE_ISSUE_NUMBER" ]]; then
              printf '<!-- SOURCE_ISSUE_ID=%s -->\n' "$SOURCE_ISSUE_NUMBER"
            fi
            printf '<!-- TASK_KEY=%s -->\n' "$TASK_KEY"
            printf '\n'
            printf '%s\n' '## Task Context' ''
            printf '%s\n' "$TASK_BODY" ''
            printf '%s\n' '## Codex Instructions' ''
            printf '%s\n' '- Read the task context before making changes.'
            printf '%s\n' '- If the task is valid, implement it directly on this PR branch.'
            printf '%s\n' '- Follow AGENTS.md validation gates that apply to the files you change.'
            printf '%s\n' '- After implementation, leave exactly one top-level comment whose first non-empty line is TASK_DONE.'
            printf '%s\n' '- If the task is invalid, leave exactly one top-level comment whose first non-empty line is TASK_INVALID, then explain why below it.'
            printf '%s\n' '- If you are blocked or uncertain, leave exactly one top-level comment whose first non-empty line is TASK_FAILED, then explain why below it.' ''
            printf '%s\n' '## Automation Notes' ''
            printf '%s\n' '- Downstream workflows parse the first non-empty line of Codex comments as the state token.'
            printf '%s\n' '- Valid state tokens are TASK_DONE, TASK_INVALID, TASK_FAILED, and REVIEW_OK.'
          } > pr-body.txt

          PR_URL=$(gh pr create \
            --repo "$GH_REPO" \
            --title "$TASK_TITLE" \
            --body-file pr-body.txt \
            --draft \
            --base "$BASE_BRANCH" \
            --head "$BRANCH")

          PR_NUMBER="${PR_URL##*/}"

          {
            printf '%s\n' '@codex review' ''
            printf '%s\n' 'Read the PR body for task context and execution instructions.' ''
            printf '%s\n' 'If the task is valid, implement it on this PR branch.' ''
            printf '%s\n' 'When you respond, make the first non-empty line exactly one of:' '- TASK_DONE' '- TASK_INVALID' '- TASK_FAILED'
          } > codex-comment.txt

          gh pr comment "$PR_NUMBER" --repo "$GH_REPO" --body-file codex-comment.txt

          gh workflow run release-check.yml \
            --repo "$GH_REPO" \
            --ref "$BRANCH"
        env:
          EVENT_ISSUE_BODY: ${{ github.event.issue.body }}
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
          EVENT_ISSUE_TITLE: ${{ github.event.issue.title }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_ISSUE_NUMBER: ${{ inputs.issue_number }}
          INPUT_SOURCE_ISSUE_NUMBER: ${{ inputs.source_issue_number }}
          INPUT_TASK_BODY: ${{ inputs.task_body }}
          INPUT_TASK_KEY: ${{ inputs.task_key }}
          INPUT_TASK_TITLE: ${{ inputs.task_title }}
